services:
  mariadb:
    image: mariadb:10.11
    container_name: llm-dispatch-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: experiment_root
      MARIADB_DATABASE: ticket_system
      MARIADB_USER: ticket_app
      MARIADB_PASSWORD: ticket_app_pw
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
    name: llm_dispatch_mariadb_data
